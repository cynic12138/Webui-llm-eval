version: '3.9'

services:
  postgres:
    image: postgres:15-alpine
    container_name: llm_eval_postgres
    environment:
      POSTGRES_USER: ${DB_USER:-llmeval}
      POSTGRES_PASSWORD: ${DB_PASS:-llmeval123}
      POSTGRES_DB: ${DB_NAME:-llmeval}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "${DB_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-llmeval}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: llm_eval_redis
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: llm_eval_minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minioadmin123}
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: llm_eval_backend
    environment:
      DATABASE_URL: postgresql+asyncpg://${DB_USER:-llmeval}:${DB_PASS:-llmeval123}@postgres:5432/${DB_NAME:-llmeval}
      DATABASE_URL_SYNC: postgresql://${DB_USER:-llmeval}:${DB_PASS:-llmeval123}@postgres:5432/${DB_NAME:-llmeval}
      REDIS_URL: redis://redis:6379/0
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-minioadmin123}
      SECRET_KEY: ${SECRET_KEY:-supersecretkey-change-in-production}
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
      HOST_IP: ${HOST_IP:-localhost}
      FRONTEND_PORT: ${FRONTEND_PORT:-3000}
      CORS_EXTRA_ORIGINS: ${CORS_EXTRA_ORIGINS:-}
    volumes:
      - ./backend:/app
      - ./eval_engine:/eval_engine
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload

  celery_worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: llm_eval_celery
    environment:
      DATABASE_URL: postgresql+asyncpg://${DB_USER:-llmeval}:${DB_PASS:-llmeval123}@postgres:5432/${DB_NAME:-llmeval}
      DATABASE_URL_SYNC: postgresql://${DB_USER:-llmeval}:${DB_PASS:-llmeval123}@postgres:5432/${DB_NAME:-llmeval}
      REDIS_URL: redis://redis:6379/0
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-minioadmin123}
      SECRET_KEY: ${SECRET_KEY:-supersecretkey-change-in-production}
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
    volumes:
      - ./backend:/app
      - ./eval_engine:/eval_engine
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: celery -A app.core.celery_app worker --loglevel=info --concurrency=4

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: llm_eval_frontend
    environment:
      NEXT_PUBLIC_API_URL: http://${HOST_IP:-localhost}:${BACKEND_PORT:-8000}
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    depends_on:
      - backend

  nginx:
    image: nginx:alpine
    container_name: llm_eval_nginx
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "80:80"
    depends_on:
      - frontend
      - backend

volumes:
  postgres_data:
  redis_data:
  minio_data:
